services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Kolobok1*}
      POSTGRES_DB: ${POSTGRES_DB:-quest_app_development}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./quest_app
    working_dir: /rails
    volumes:
      - ./quest_app:/rails
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-Kolobok1*}@db:5432/${POSTGRES_DB:-quest_app_development}
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Kolobok1*}
      POSTGRES_DB: ${POSTGRES_DB:-quest_app_development}
      RAILS_ENV: ${RAILS_ENV:-development}
      TESSERACT_COMMAND: tesseract
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    command: bash -c "bundle install && ruby bin/rails db:prepare && rm -f tmp/pids/server.pid && ruby bin/rails server -b 0.0.0.0 -p 3000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend-quest
    working_dir: /app
    volumes:
      - ./frontend-quest:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    command: sh -c "npm install && npm run dev -- --host"
